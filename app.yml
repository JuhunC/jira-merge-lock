# GitHub App manifest for merge-lock.
# Used with GitHub's "register an app from a manifest" flow — see README setup
# step 1. Replace YOUR-DEPLOYMENT-HOST with the public HTTPS host the
# container is served behind.

name: merge-lock
description: >-
  Blocks PR merges until all referenced Jira issues are done
  (merge-lock/jira-issue) and, optionally, the PR has enough comments from
  non-authors (merge-lock/min-comment).

# Homepage = the app's own developer-guidelines page, served at GET / by the
# container itself ("why is my PR locked?" lands here).
url: https://YOUR-DEPLOYMENT-HOST/

hook_attributes:
  url: https://YOUR-DEPLOYMENT-HOST/api/github/webhooks

public: false

default_permissions:
  # Create check runs; receive check re-run events.
  checks: write
  # List PRs and PR commits.
  pull_requests: read
  # Commit-compare fallback for PRs with >250 commits.
  contents: read
  # PR conversation comments live on the ISSUE comments API, and the
  # issue_comment webhook needs this — both used only by the optional
  # MIN_PR_COMMENTS discussion gate.
  issues: read
  # Required ONLY to receive the merge_group webhook event (merge-queue
  # support). The app never writes to merge queues.
  merge_queues: read
  # Baseline; branch-rules scope endpoint.
  metadata: read
  # Org ruleset read+write (auto-configure). NOT repo "administration".
  # Hardened alternative: RULESET_AUTOCONFIGURE=false — see README.
  organization_administration: write

default_events:
  - pull_request
  - check_run
  - check_suite
  - repository_ruleset
  - merge_group
  # The three below feed the optional MIN_PR_COMMENTS discussion gate.
  - issue_comment
  - pull_request_review
  - pull_request_review_comment
